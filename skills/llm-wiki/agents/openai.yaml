interface:
  display_name: "LLM Wiki"
  short_description: "Maintain an Obsidian/Markdown LLM Wiki through llm-wiki."
  default_prompt: "Use the llm-wiki skill and the llm_wiki MCP server."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "llm_wiki"
      description: "LLM Wiki MCP Streamable HTTP server"
      transport: "streamable_http"
      url: "http://127.0.0.1:9999/mcp"
