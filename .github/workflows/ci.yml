name: ci

on:
  push:
    branches:
      - "**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - name: Type check with mypy
        run: uv run mypy src tests
      - name: Run tests with coverage gate
        run: |
          uv run pytest -vv \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=json:coverage.json \
            --cov-fail-under=80
      - name: Build coverage summary
        if: always()
        run: uv run python scripts/coverage_summary.py coverage.json > coverage-summary.md
      - name: Publish coverage summary to job summary
        if: always()
        run: cat coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment coverage summary on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- llm-wiki-coverage -->';
            const summary = fs.existsSync('coverage-summary.md')
              ? fs.readFileSync('coverage-summary.md', 'utf8')
              : '## 테스트 커버리지\n\ncoverage-summary.md 파일을 찾지 못했습니다.';
            const body = `${marker}\n${summary}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.data.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
